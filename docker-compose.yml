version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rosey-backend
    ports:
      - "8000:8000"
    environment:
      LIVEKIT_URL: ${LIVEKIT_URL:-wss://your-livekit-server.com}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-your_api_key}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-your_api_secret}
    networks:
      - rosey-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/config"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: rosey-frontend
    ports:
      - "80:80"
    environment:
      REACT_APP_API_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - rosey-network
    restart: unless-stopped

networks:
  rosey-network:
    driver: bridge
